<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1" name="viewport" />
        <title>New Inquiry</title>
    </head>
    <body style="background-color: #f7f8fa; font-family: 'Hanken Grotesk', system-ui, sans-serif; margin: 0; padding: 0">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f7f8fa">
            <tr>
                <td style="padding: 32px 16px">
                    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin: 0 auto; max-width: 600px">
                        <tr>
                            <td style="background-color: #2a52e0; border-radius: 8px 8px 0 0; padding: 28px 32px">
                                <h1 style="color: #ffffff; font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin: 0">New Inquiry</h1>
                            </td>
                        </tr>
                        <tr>
                            <td style="background-color: #ffffff; border-bottom: 1px solid #eceef2; padding: 24px 32px 20px">
                                <p style="color: #6e7482; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; margin: 0 0 12px; text-transform: uppercase">Contact</p>
                                <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                                    <tr>
                                        <td style="color: #6e7482; font-size: 16px; padding: 6px 12px 6px 0; vertical-align: top; white-space: nowrap">Name</td>
                                        <td style="color: #14161c; font-size: 16px; padding: 6px 0; word-break: break-word">{{name}}</td>
                                    </tr>
                                    <tr>
                                        <td style="color: #6e7482; font-size: 16px; padding: 6px 12px 6px 0; vertical-align: top; white-space: nowrap">WeChat</td>
                                        <td style="color: #14161c; font-size: 16px; padding: 6px 0; word-break: break-word">{{wechat}}</td>
                                    </tr>
                                    {{emailRow}}
                                </table>
                            </td>
                        </tr>
                        <tr>
                            <td style="background-color: #ffffff; border-radius: 0 0 8px 8px; padding: 20px 32px 28px">
                                <p style="color: #6e7482; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; margin: 0 0 12px; text-transform: uppercase">Message</p>
                                <p style="color: #14161c; font-size: 16px; line-height: 1.6; margin: 0; white-space: pre-wrap">{{message}}</p>
                            </td>
                        </tr>
                        <tr>
                            <td style="padding: 20px 32px 0; text-align: center">
                                <a href="https://intersubstudio.com" style="color: #6e7482; font-size: 12px; text-decoration: none">InterSub Studio</a>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
